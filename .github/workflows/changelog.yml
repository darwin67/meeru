name: Changelog

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Validate tag matches workspace version
        id: version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          crate_version="$(sed -n 's/^version = \"\(.*\)\"/\1/p' Cargo.toml | head -n 1)"

          if [ -z "${crate_version}" ]; then
            echo "Failed to read version from Cargo.toml"
            exit 1
          fi

          if [ "${tag_version}" != "${crate_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${crate_version}"
            exit 1
          fi

          echo "crate_version=${crate_version}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: release-notes
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.release-notes.outputs.content }}
